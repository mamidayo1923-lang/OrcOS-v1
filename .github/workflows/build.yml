name: Build OrcOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build OrcOS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (ISO tools & compilers)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xorriso \
            mtools \
            nasm \
            build-essential \
            make

      - name: Install Rust toolchain (Nightly for OS development)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
          override: true

      - name: Run Build Script (Generate ISO)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orcos-iso
          path: orcos.iso
